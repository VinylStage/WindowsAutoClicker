name: Build and Release Windows EXE

on:
  push:
    branches: [ "main", "master" ]
    tags:
      - 'v*' # v1.0.0, v2.1.3 등의 태그 푸시 발생 시 릴리즈 트리거
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write # GitHub Releases를 생성하고 파일을 업로드하기 위해 필수

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Poetry
      run: |
        python -m pip install --upgrade pip
        pip install poetry

    - name: Install dependencies
      run: |
        poetry install

    - name: Build with PyInstaller
      run: |
        poetry run pyinstaller --noconfirm --onefile --windowed --name "WindowsAutoClicker_Pro" --collect-all customtkinter autoclicker.py

    - name: Upload Artifact (Action 내부 보관용)
      uses: actions/upload-artifact@v4
      with:
        name: WindowsAutoClicker-EXE
        path: dist/WindowsAutoClicker_Pro.exe

    - name: Publish to GitHub Releases
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/') # 태그가 푸시되었을 때만 릴리즈 생성
      with:
        files: dist/WindowsAutoClicker_Pro.exe
        generate_release_notes: true
