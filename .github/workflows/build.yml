name: Build and Release Windows EXE

on:
  push:
    branches: [ "main", "master" ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies with pip
      run: |
        python -m pip install --upgrade pip
        pip install pyautogui keyboard customtkinter pyinstaller

    - name: Build with PyInstaller
      run: |
        pyinstaller --noconfirm --onefile --windowed --name "WindowsAutoClicker_Pro" --collect-all customtkinter autoclicker.py

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: WindowsAutoClicker-EXE
        path: dist/WindowsAutoClicker_Pro.exe

    - name: Publish to GitHub Releases
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: dist/WindowsAutoClicker_Pro.exe
        generate_release_notes: true
