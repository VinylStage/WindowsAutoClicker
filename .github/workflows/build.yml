name: Build Windows EXE

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Poetry
      run: |
        python -m pip install --upgrade pip
        pip install poetry

    - name: Install dependencies
      run: |
        poetry install

    - name: Build with PyInstaller
      run: |
        poetry run pyinstaller --noconfirm --onefile --windowed --name "WindowsAutoClicker_MasterPro" --collect-all customtkinter autoclicker.py

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: WindowsAutoClicker-Windows
        path: dist/WindowsAutoClicker_MasterPro.exe
